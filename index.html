<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SLICE-D — Sistem Layanan Informasi Cerdas Denpasar</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700;900&family=Barlow:wght@300;400;600&family=Barlow+Condensed:wght@700;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --blue-mid:  #6b8cb8;
      --blue-dark: #3d5a7a;
      --blue-light:#a8c0d6;
      --white:     #ffffff;
      --cream:     #f0ece4;
      --gold:      #c8a84b;
    }

    html, body {
      height: 100%;
      overflow: hidden;
    }

    body {
      font-family: 'Barlow', sans-serif;
      background: #6b8cb8;
      display: flex;
      align-items: stretch;
      position: relative;
    }

    /* ── grain texture overlay ── */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='1'/%3E%3C/svg%3E");
      opacity: 0.18;
      pointer-events: none;
      z-index: 1;
    }

    /* ── radial vignette ── */
    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background: radial-gradient(ellipse at 40% 50%, transparent 30%, rgba(30,50,80,0.45) 100%);
      pointer-events: none;
      z-index: 2;
    }

    /* ── LEFT PANEL ── */
    .left-panel {
      flex: 1;
      position: relative;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      z-index: 10;
      padding: 40px;
    }

    /* SLICE-D brand top-left */
    .brand {
      position: absolute;
      top: 28px;
      left: 32px;
      display: flex;
      align-items: center;
      gap: 10px;
      opacity: 0;
      animation: fadeUp 0.8s ease 0.1s forwards;
    }

    .brand-icon {
      width: 38px;
      height: 38px;
    }

    .brand-name {
      font-family: 'Cinzel', serif;
      font-size: 18px;
      font-weight: 700;
      color: var(--white);
      letter-spacing: 2px;
      text-shadow: 0 1px 4px rgba(0,0,0,0.3);
    }

    /* version bottom-left */
    .version {
      position: absolute;
      bottom: 24px;
      left: 32px;
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 13px;
      color: rgba(255,255,255,0.45);
      letter-spacing: 1px;
    }

    /* center card */
    .login-card {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0;
      width: 100%;
      max-width: 380px;
    }

    /* emblem */
    .emblem {
      width: 100px;
      height: 100px;
      margin-bottom: 22px;
      opacity: 0;
      animation: fadeUp 0.9s ease 0.25s forwards;
    }

    /* title */
    .title {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: clamp(18px, 2.4vw, 26px);
      font-weight: 800;
      color: var(--white);
      text-align: center;
      letter-spacing: 4px;
      line-height: 1.3;
      text-transform: uppercase;
      text-shadow: 0 2px 8px rgba(30,50,80,0.4);
      margin-bottom: 38px;
      opacity: 0;
      animation: fadeUp 0.9s ease 0.4s forwards;
    }

    /* field group */
    .field {
      width: 100%;
      margin-bottom: 22px;
      opacity: 0;
      animation: fadeUp 0.9s ease var(--delay, 0.55s) forwards;
    }

    .field-label {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 4px;
      color: rgba(255,255,255,0.85);
      text-align: center;
      margin-bottom: 10px;
      text-transform: uppercase;
    }

    .field input {
      width: 100%;
      height: 48px;
      border-radius: 999px;
      border: none;
      background: rgba(255,255,255,0.88);
      padding: 0 24px;
      font-family: 'Barlow', sans-serif;
      font-size: 15px;
      color: #2c3e50;
      outline: none;
      transition: background 0.2s, box-shadow 0.2s;
      box-shadow: 0 2px 12px rgba(30,50,80,0.18);
    }

    .field input:focus {
      background: var(--white);
      box-shadow: 0 0 0 3px rgba(200,168,75,0.45), 0 2px 16px rgba(30,50,80,0.25);
    }

    /* login button */
    .btn-login {
      margin-top: 10px;
      width: 100%;
      height: 48px;
      border-radius: 999px;
      border: 2px solid rgba(255,255,255,0.75);
      background: transparent;
      cursor: pointer;
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 14px;
      font-weight: 700;
      letter-spacing: 4px;
      color: var(--white);
      text-transform: uppercase;
      transition: background 0.25s, border-color 0.25s, transform 0.15s;
      opacity: 0;
      animation: fadeUp 0.9s ease 0.8s forwards;
    }

    .btn-login:hover {
      background: rgba(255,255,255,0.15);
      border-color: var(--white);
    }

    .btn-login:active {
      transform: scale(0.98);
    }

    /* loading spinner shown on click */
    .btn-login.loading {
      pointer-events: none;
    }

    .btn-login.loading::after {
      content: '';
      display: inline-block;
      width: 14px; height: 14px;
      border: 2px solid rgba(255,255,255,0.4);
      border-top-color: white;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      vertical-align: middle;
      margin-left: 8px;
    }

    .error-msg {
      margin-top: 12px;
      font-size: 12px;
      color: #ffcdd2;
      letter-spacing: 1px;
      text-align: center;
      min-height: 18px;
      font-family: 'Barlow', sans-serif;
    }

    /* ── RIGHT PANEL — decorative hand ── */
    .right-panel {
      width: 38%;
      max-width: 560px;
      position: relative;
      overflow: hidden;
      z-index: 5;
      display: flex;
      align-items: flex-end;
      justify-content: center;
    }

    /* Silhouette of raised Balinese hand drawn in SVG */
    .hand-art {
      position: absolute;
      bottom: 0;
      right: -20px;
      width: 85%;
      max-width: 380px;
      opacity: 0;
      animation: riseUp 1.2s cubic-bezier(0.16,1,0.3,1) 0.6s forwards;
      filter: grayscale(1) contrast(1.1);
    }

    /* subtle right-side glow */
    .right-panel::before {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse at 60% 60%, rgba(255,255,255,0.07) 0%, transparent 70%);
      z-index: 6;
      pointer-events: none;
    }

    /* ── ANIMATIONS ── */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(18px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @keyframes riseUp {
      from { opacity: 0; transform: translateY(60px); }
      to   { opacity: 0.82; transform: translateY(0); }
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    /* ── RESPONSIVE ── */
    @media (max-width: 700px) {
      .right-panel { display: none; }
      .left-panel { padding: 32px 24px; }
    }
  </style>
</head>
<body>

  <!-- LEFT: form area -->
  <div class="left-panel">

    <!-- brand top-left -->
    <div class="brand">
      <!-- SLICE-D snowflake/leaf icon -->
      <svg class="brand-icon" viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
        <g stroke="white" stroke-width="1.6" stroke-linecap="round">
          <line x1="20" y1="4"  x2="20" y2="36"/>
          <line x1="4"  y1="20" x2="36" y2="20"/>
          <line x1="8"  y1="8"  x2="32" y2="32"/>
          <line x1="32" y1="8"  x2="8"  y2="32"/>
          <circle cx="20" cy="20" r="4" fill="white" stroke="none"/>
          <!-- tips -->
          <line x1="20" y1="4"  x2="17" y2="8"/>  <line x1="20" y1="4"  x2="23" y2="8"/>
          <line x1="20" y1="36" x2="17" y2="32"/> <line x1="20" y1="36" x2="23" y2="32"/>
          <line x1="4"  y1="20" x2="8"  y2="17"/> <line x1="4"  y1="20" x2="8"  y2="23"/>
          <line x1="36" y1="20" x2="32" y2="17"/> <line x1="36" y1="20" x2="32" y2="23"/>
        </g>
      </svg>
      <span class="brand-name">SLICE-D</span>
    </div>

    <!-- center card -->
    <div class="login-card">

      <!-- Denpasar emblem (pentagon SVG recreation) -->
      <svg class="emblem" viewBox="0 0 100 110" xmlns="http://www.w3.org/2000/svg">
        <!-- pentagon shape -->
        <polygon points="50,4 96,36 78,90 22,90 4,36"
          fill="#1a5276" stroke="#c8a84b" stroke-width="3"/>
        <!-- inner white ring -->
        <polygon points="50,10 89,39 73,85 27,85 11,39"
          fill="none" stroke="white" stroke-width="1" opacity="0.5"/>
        <!-- stylised kris / dagger -->
        <line x1="50" y1="22" x2="50" y2="72" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
        <polygon points="50,18 54,30 50,28 46,30" fill="#c8a84b"/>
        <!-- laurel left -->
        <path d="M28,60 Q22,50 26,38 Q30,44 28,54 Q32,46 38,40 Q36,48 30,56" fill="#2ecc71" opacity="0.85"/>
        <!-- laurel right -->
        <path d="M72,60 Q78,50 74,38 Q70,44 72,54 Q68,46 62,40 Q64,48 70,56" fill="#2ecc71" opacity="0.85"/>
        <!-- base text placeholder -->
        <text x="50" y="82" text-anchor="middle" font-size="5" fill="white"
          font-family="serif" letter-spacing="0.5">KOTA DENPASAR</text>
      </svg>

      <h1 class="title">Sistem Layanan Informasi Cerdas<br>Denpasar</h1>

      <!-- username -->
      <div class="field" style="--delay:0.55s">
        <div class="field-label">Username</div>
        <input type="text" id="username" placeholder="" autocomplete="username" />
      </div>

      <!-- password -->
      <div class="field" style="--delay:0.68s">
        <div class="field-label">Password</div>
        <input type="password" id="password" placeholder="" autocomplete="current-password" />
      </div>

      <button class="btn-login" id="btnLogin" onclick="handleLogin()">Masuk</button>
      <div class="error-msg" id="errorMsg"></div>

    </div>

    <div class="version">23.1-6</div>
  </div>

  <!-- RIGHT: decorative Balinese hand silhouette -->
  <div class="right-panel">
    <!--
      Letakkan foto tangan penari Bali Anda di sini.
      Rename foto menjadi: hand.png  lalu taruh di folder yang sama dengan index.html
      Hapus komentar di bawah ini (hapus tanda    dan   ):
    -->
    <!--
    <img class="hand-art" src="hand.png" alt="Balinese dancer" />
    -->

    <!-- Placeholder SVG sementara sebelum foto asli diupload -->
    <svg class="hand-art" viewBox="0 0 320 560" xmlns="http://www.w3.org/2000/svg" opacity="0.6">
      <!-- simplified raised hand silhouette -->
      <g fill="#c8c8c8" stroke="#999" stroke-width="0.5">
        <!-- palm -->
        <ellipse cx="160" cy="420" rx="70" ry="90"/>
        <!-- thumb -->
        <ellipse cx="100" cy="360" rx="22" ry="55" transform="rotate(-20 100 360)"/>
        <!-- index -->
        <ellipse cx="128" cy="270" rx="18" ry="80" transform="rotate(-8 128 270)"/>
        <!-- middle -->
        <ellipse cx="158" cy="240" rx="18" ry="95" transform="rotate(0 158 240)"/>
        <!-- ring -->
        <ellipse cx="188" cy="255" rx="17" ry="85" transform="rotate(8 188 255)"/>
        <!-- pinky -->
        <ellipse cx="214" cy="290" rx="14" ry="65" transform="rotate(14 214 290)"/>
        <!-- wrist/arm -->
        <rect x="120" y="490" width="80" height="80" rx="20"/>
        <!-- bracelets -->
        <rect x="108" y="480" width="104" height="14" rx="7" fill="#a0a0a0"/>
        <rect x="112" y="498" width="96" height="10" rx="5" fill="#b0b0b0"/>
      </g>
    </svg>
  </div>

  <script>
    function handleLogin() {
      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value.trim();
      const btn      = document.getElementById('btnLogin');
      const errMsg   = document.getElementById('errorMsg');

      errMsg.textContent = '';

      if (!username || !password) {
        errMsg.textContent = 'USERNAME DAN PASSWORD WAJIB DIISI';
        return;
      }

      // Tampilkan loading
      btn.classList.add('loading');
      btn.textContent = 'MEMVERIFIKASI';

      // Simulasi proses login (ganti dengan logika asli nanti)
      setTimeout(() => {
        btn.classList.remove('loading');
        btn.textContent = 'Masuk';

        // ── GANTI LOGIKA DI SINI ──
        // Contoh akun sementara (hapus ini saat sudah ada backend):
        if (username === 'admin' && password === 'denpasar2025') {
          window.location.href = 'dashboard.html'; // arahkan ke halaman berikutnya
        } else {
          errMsg.textContent = 'USERNAME ATAU PASSWORD SALAH';
          document.getElementById('password').value = '';
        }
      }, 1200);
    }

    // Tekan Enter untuk login
    document.addEventListener('keydown', function(e) {
      if (e.key === 'Enter') handleLogin();
    });
  </script>
</body>
</html>
